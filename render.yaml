databases:
  - name: dialpad-db
    plan: free
    databaseName: dialpad_calls
    user: dialpad

services:
  - type: web
    name: dialpad-webhook
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DIALPAD_API_KEY
        sync: false
      - key: DIALPAD_WEBHOOK_SECRET
        sync: false
      - key: DIALPAD_API_BASE_URL
        value: https://sandbox.dialpad.com/api/v2
      - key: DATABASE_URL
        fromDatabase:
          name: dialpad-db
          property: connectionString
      - key: LOG_LEVEL
        value: info
      - key: PYTHON_VERSION
        value: "3.12.0"
    healthCheckPath: /health
